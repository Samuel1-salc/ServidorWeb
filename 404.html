<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>404 - Página Não Encontrada</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #ffeaea; color: #333; text-align: center; padding: 50px; }
        h1 { color: #dc3545; font-size: 5em; margin-bottom: 0; }
        h2 { margin-top: 0; color: #666; }
        .container { background-color: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); display: inline-block; }
        a { color: #007bff; text-decoration: none; font-weight: bold; padding: 10px 20px; border: 1px solid #007bff; border-radius: 5px; display: inline-block; margin-top: 20px;}
        a:hover { background-color: #007bff; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <h2>Oops! Arquivo não encontrado.</h2>
        <p>O recurso que você tentou acessar não existe neste servidor.</p>
        <a href="/index.html">Voltar para a Página Inicial</a>
    </div>
</body>
</html>
